name: FastAPI CI

on:
  push:
    branches: [ day3 ]
  pull_request:
    branches: [ day3 ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: hassaan
          POSTGRES_PASSWORD: hassaan12
          POSTGRES_DB: inventory_system
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://hassaan:hassaan12@127.0.0.1:5432/inventory_system

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v
