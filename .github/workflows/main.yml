name: FastAPI SQLite CI

on:
  push:
    branches: [ day4 ]
  pull_request:
    branches: [ day4 ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with SQLite
        run: |
          pytest -v
