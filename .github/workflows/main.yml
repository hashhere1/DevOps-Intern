name: FastAPI CLI

on:
  push:
    branches: [ day3 ]
  pull_request:
    branches: [ day3 ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: hassaan
          POSTGRES_PASSWORD: hassaan12
          POSTGRES_DB: inventory_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://hassaan:hassaan12@postgres:5432/inventory_system
      PGPASSWORD: hassaan12

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PostgreSQL client (for pg_isready)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL (with timeout and debug)
        run: |
          echo "Checking if PostgreSQL is ready..."
          for i in {1..30}; do
            pg_isready -h postgres -p 5432 -U hassaan && { echo "PostgreSQL is ready!"; exit 0; }
            echo "[$i/30] PostgreSQL is not ready yet."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time. Exiting."
          exit 1
        env:
          PGPASSWORD: hassaan12

      - name: Run Tests
        run: pytest -v --log-cli-level=DEBUG
        env:
          DATABASE_URL: postgresql://hassaan:hassaan12@postgres:5432/inventory_system