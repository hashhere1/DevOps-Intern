name: FastAPI CLI

on:
  push:
    branches: [ day3 ]
  pull_request:
    branches: [ day3 ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mydatabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mydatabase

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PostgreSQL client (for pg_isready)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL (with timeout)
        run: |
          echo "Checking if PostgreSQL is ready..."
          for i in {1..15}; do
            if pg_isready -h postgres -p 5432 -U postgres; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "[$i/15] Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL did not become ready in time. Exiting."
          exit 1
        env:
          PGPASSWORD: postgres

      - name: Run Tests
        run: pytest -v
