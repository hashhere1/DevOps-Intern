name: FastAPI CI
on:
  push:
    branches: [ day3 ]
  pull_request:
    branches: [ day3 ]
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: hassaan
          POSTGRES_PASSWORD: hassaan12
          POSTGRES_DB: inventory_system
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hassaan -d inventory_system"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://hassaan:hassaan12@postgres:5432/inventory_system
      PGPASSWORD: hassaan12
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if pg_isready -h postgres -U hassaan -d inventory_system; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "[$i/30] PostgreSQL not ready yet..."
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1
      - name: Run Tests
        run: pytest -v --log-cli-level=DEBUG
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}